# Railway deploy config — https://railway.app
# `railway up` deploys this service

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
# Cold start budget: alembic upgrade (~10-20s on first deploy with 12
# migrations) + uvicorn boot (~5s) + safety buffer. Railway kills the
# container if /health never returns 200 within this window.
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Hardcode --workers=2 to avoid shell-expansion edge cases on Railway's
# runner (some shells don't expand ${VAR:-default} syntax). Plenty for
# free-tier traffic; scale via Railway dashboard when needed.
startCommand = "bash scripts/start.sh"

# Env vars managed via Railway dashboard — see /core/config.py for full list.
# Bare minimum: DATABASE_URL, REDIS_URL, JWT_SECRET, APP_SECRET_KEY, CRON_SECRET,
# APP_CORS_ORIGINS, PI_AI_NEW_ROUTING_ENABLED.
