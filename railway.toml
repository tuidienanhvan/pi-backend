# Railway deploy config — https://railway.app
# `railway up` deploys this service

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
startCommand = "alembic upgrade head && gunicorn app.main:app --worker-class=uvicorn.workers.UvicornWorker --bind=0.0.0.0:$PORT --workers=$WEB_CONCURRENCY --timeout=60"

# Env vars managed via Railway dashboard:
#   APP_SECRET_KEY, JWT_SECRET, DATABASE_URL, REDIS_URL,
#   ANTHROPIC_API_KEY, OPENAI_API_KEY, APP_BASE_URL,
#   APP_CORS_ORIGINS, SENTRY_DSN
